name: Client Compatibility
on:
  pull_request:
  push:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: Build beanstalkd (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4
      - run: make
      - uses: actions/upload-artifact@v4
        with:
          name: beanstalkd-${{ matrix.runner }}
          path: beanstalkd
  pheanstalk:
    name: Pheanstalk (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    needs:
      - build
    steps:
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: phpunit
      - uses: actions/download-artifact@v4
        with:
          name: beanstalkd-${{ matrix.runner }}
      - name: Start beanstalkd for ${{ matrix.runner }}
        run: chmod +x ./beanstalkd && ./beanstalkd &
      - uses: actions/checkout@v4
        with:
          repository: pheanstalk/pheanstalk
          ref: v5
      - name: Install dependencies including dev-dependencies
        run: composer install
      - name: Run tests
        run: phpunit
        env:
          SERVER_HOST: localhost
  greenstalk:
    name: Greenstalk (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        python-version: [ 3.9 ]
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    needs:
      - build
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/checkout@v4
        with:
          repository: justinmayhew/greenstalk
      - uses: actions/download-artifact@v4
        id: download
        with:
          #include-hidden-files: true
          name: beanstalkd-${{ matrix.runner }}
      - name: Make beanstalkd executable for ${{ matrix.runner }}
        run: chmod +x ${{steps.download.outputs.download-path}}/beanstalkd
      - name: Run beanstalkd -v
        run: ${{steps.download.outputs.download-path}}/beanstalkd -v

      - name: Install dependencies
        run: |
          pip install pytest
          pip install .
      - name: Run tests
        env:
          BEANSTALKD_PATH: ${{steps.download.outputs.download-path}}/beanstalkd
        run: make test
  pystalk:
    name: Pystalk (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        python-version: [ "3.10" ]
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    needs:
      - build
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/checkout@v4
        with:
          repository: EasyPost/pystalk
      - uses: actions/download-artifact@v4
        id: download
        with:
          name: beanstalkd-${{ matrix.runner }}
      - name: Make beanstalkd executable for ${{ matrix.runner }}
        run: chmod +x ${{steps.download.outputs.download-path}}/beanstalkd
      - name: Run beanstalkd -v
        run: ${{steps.download.outputs.download-path}}/beanstalkd -v
      - name: Install dependencies
        run: python -m pip install -r requirements-tests.txt -e .
      - name: Run tests
        env:
          BEANSTALKD_PATH: ${{steps.download.outputs.download-path}}/beanstalkd
        run: pytest tests/
